<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Bed time — a bedtime prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500;1,9..144,700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --midnight: #1a1740;
    --deep-plum: #2a1f5a;
    --plum: #3d2f6e;
    --dusk: #6b4e8a;
    --peach-glow: #c27a85;
    --moonlight: #fff5dc;
    --cream: #fef4e2;
    --pillow: #fff0e0;
    --mattress: #f5e4ca;
    --mattress-shade: #d9c19e;
    --ink: #2a1f3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse 120% 60% at 50% -10%, #4a3b7a 0%, transparent 70%),
      radial-gradient(ellipse 80% 50% at 50% 110%, #5a3d5a 0%, transparent 70%),
      linear-gradient(180deg, #0d0a24 0%, #161239 50%, #1a1740 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem 1rem;
    font-family: 'Quicksand', system-ui, sans-serif;
    color: var(--moonlight);
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: -10%;
    background:
      radial-gradient(circle at 15% 20%, rgba(255, 245, 220, 0.06), transparent 30%),
      radial-gradient(circle at 85% 80%, rgba(194, 122, 133, 0.08), transparent 35%);
    pointer-events: none;
    z-index: 0;
  }

  /* ----- Phone frame ----- */
  .phone {
    position: relative;
    width: 390px;
    max-width: 100%;
    height: 844px;
    max-height: calc(100vh - 3rem);
    background:
      linear-gradient(180deg,
        #1e1748 0%,
        #2d2064 30%,
        #553f7f 65%,
        #8a5776 85%,
        #c27a85 100%);
    border-radius: 52px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px #0a081c,
      0 0 0 12px #1a1634,
      0 0 0 13px #2a2550,
      0 40px 100px rgba(0, 0, 0, 0.55),
      0 0 140px rgba(150, 120, 200, 0.18);
    isolation: isolate;
    z-index: 1;
  }

  .island {
    position: absolute;
    top: 11px;
    left: 50%;
    transform: translateX(-50%);
    width: 118px;
    height: 34px;
    background: #0a081c;
    border-radius: 20px;
    z-index: 50;
  }

  .stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 1; }
  .star {
    position: absolute;
    background: var(--moonlight);
    border-radius: 50%;
    opacity: 0.6;
    animation: twinkle 3s ease-in-out infinite;
    box-shadow: 0 0 4px rgba(255, 245, 220, 0.6);
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.25; transform: scale(0.8); }
    50%      { opacity: 1;    transform: scale(1.3); }
  }

  .moon {
    position: absolute;
    top: 74px;
    right: 34px;
    width: 40px;
    height: 40px;
    background: radial-gradient(circle at 35% 35%, #fffaee 0%, #f3d896 80%, #d6b77a 100%);
    border-radius: 50%;
    box-shadow:
      0 0 24px rgba(255, 245, 220, 0.35),
      0 0 60px rgba(255, 245, 220, 0.18),
      inset -8px -4px 0 -2px rgba(0, 0, 0, 0.08);
    z-index: 2;
  }
  .moon::after {
    content: '';
    position: absolute;
    top: 10px; left: 10px;
    width: 5px; height: 5px;
    background: rgba(0, 0, 0, 0.08);
    border-radius: 50%;
    box-shadow:
      9px 7px 0 -1px rgba(0, 0, 0, 0.06),
      -2px 12px 0 -2px rgba(0, 0, 0, 0.06);
  }

  /* Status bar */
  .status-bar {
    position: relative;
    height: 56px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 34px 0;
    font-size: 15px;
    font-weight: 600;
    z-index: 10;
    letter-spacing: 0.01em;
  }
  .status-bar .indicators {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
  }
  .bars { display: inline-flex; gap: 2px; align-items: flex-end; }
  .bars i {
    display: block;
    width: 3px;
    background: currentColor;
    border-radius: 1px;
  }
  .bars i:nth-child(1) { height: 4px; }
  .bars i:nth-child(2) { height: 6px; }
  .bars i:nth-child(3) { height: 8px; }
  .bars i:nth-child(4) { height: 10px; }
  .battery {
    display: inline-block;
    width: 24px; height: 12px;
    border: 1px solid currentColor;
    border-radius: 3px;
    position: relative;
    padding: 1px;
  }
  .battery::after {
    content: '';
    position: absolute;
    right: -3px; top: 3px;
    width: 2px; height: 4px;
    background: currentColor;
    border-radius: 0 1px 1px 0;
  }
  .battery span {
    display: block;
    width: 80%;
    height: 100%;
    background: currentColor;
    border-radius: 1px;
  }

  /* ----- Header (decluttered) ----- */
  .header {
    position: relative;
    padding: 18px 30px 14px;
    z-index: 5;
  }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 46px;
    letter-spacing: -0.03em;
    line-height: 0.95;
    color: var(--moonlight);
  }
  .header h1 .dot { color: #f4c19a; }
  .header .subtitle {
    margin-top: 8px;
    font-size: 12.5px;
    opacity: 0.6;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  /* ----- Beds grid ----- */
  .beds {
    position: relative;
    padding: 16px 14px 26px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 7px;
    height: calc(100% - 170px);
    overflow-y: auto;
    z-index: 5;
    scrollbar-width: none;
    align-content: start;
  }
  .beds::-webkit-scrollbar { display: none; }

  /* ----- Individual bed ----- */
  .bed {
    position: relative;
    aspect-ratio: 55 / 72;
    background: linear-gradient(180deg, var(--mattress) 0%, var(--mattress-shade) 100%);
    border-radius: 8px;
    border: none;
    padding: 0;
    cursor: pointer;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    font: inherit;
    color: inherit;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.55),
      inset 0 -2px 0 rgba(0, 0, 0, 0.08),
      0 3px 6px rgba(0, 0, 0, 0.28);
    transition: transform 0.18s ease;
  }
  .bed:active:not(.tucked) { transform: scale(0.93); }
  .bed:focus-visible {
    outline: 2px solid var(--moonlight);
    outline-offset: 3px;
  }

  .pillow {
    position: absolute;
    top: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 78%;
    height: 8px;
    background: linear-gradient(180deg, #fff6e3 0%, #ead7b8 100%);
    border-radius: 5px;
    box-shadow: 0 1px 1px rgba(0, 0, 0, 0.12);
    z-index: 1;
  }

  .animal {
    position: absolute;
    top: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 82%;
    aspect-ratio: 1;
    z-index: 3;
    animation: bob 3.6s ease-in-out infinite;
    transform-origin: center bottom;
    pointer-events: none;
  }
  @keyframes bob {
    0%, 100% { transform: translateX(-50%) translateY(0) rotate(-1.5deg); }
    50%      { transform: translateX(-50%) translateY(-1.5px) rotate(1.5deg); }
  }
  .bed.tucked .animal { animation: snooze 5s ease-in-out infinite; }
  @keyframes snooze {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%      { transform: translateX(-50%) translateY(-0.8px); }
  }

  /* Blanket */
  .blanket {
    position: absolute;
    left: 3px;
    right: 3px;
    bottom: 3px;
    height: 13px;
    background: linear-gradient(135deg, var(--blanket, #e58b7b) 0%, var(--blanket-dark, #b5604f) 100%);
    border-radius: 6px 6px 5px 5px;
    transform-origin: bottom;
    transition:
      height 0.65s cubic-bezier(0.34, 1.2, 0.64, 1),
      border-radius 0.5s ease;
    z-index: 4;
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, 0.25),
      inset 0 -1px 0 rgba(0, 0, 0, 0.1),
      0 -2px 4px rgba(0, 0, 0, 0.18);
  }
  .blanket::before {
    content: '';
    position: absolute;
    top: 3px; left: 2px; right: 2px;
    height: 2.5px;
    background: rgba(255, 255, 255, 0.3);
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .bed.tucked .blanket {
    height: 62%;
    border-radius: 10px 10px 5px 5px;
  }
  .bed.tucked .blanket::before { opacity: 0.7; }

  /* Eye toggle */
  .eye-open  { transition: opacity 0.25s 0.3s; opacity: 1; }
  .eye-closed { transition: opacity 0.25s; opacity: 0; }
  .bed.tucked .eye-open  { opacity: 0; transition-delay: 0s; }
  .bed.tucked .eye-closed { opacity: 1; transition-delay: 0.45s; }

  .mouth-awake { transition: opacity 0.3s 0.2s; opacity: 1; }
  .mouth-asleep { transition: opacity 0.3s; opacity: 0; }
  .bed.tucked .mouth-awake { opacity: 0; transition-delay: 0s; }
  .bed.tucked .mouth-asleep { opacity: 1; transition-delay: 0.5s; }

  /* Zzz — 0–3 letters drifting up, varied per bed */
  .zzz {
    position: absolute;
    top: 0;
    right: 3px;
    width: 18px;
    height: 22px;
    pointer-events: none;
    z-index: 5;
  }
  .zzz span {
    position: absolute;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 700;
    color: var(--moonlight);
    opacity: 0;
    text-shadow: 0 0 5px rgba(255, 245, 220, 0.7);
    bottom: 0; right: 0;
  }
  .zzz span:nth-child(1) { font-size: 8.5px; }
  .zzz span:nth-child(2) { font-size: 10.5px; }
  .zzz span:nth-child(3) { font-size: 13px; }
  .bed.tucked .zzz span {
    animation: zzz-drift 2.6s ease-in-out infinite;
  }
  .bed.tucked .zzz span:nth-child(1) { animation-delay: 0s; }
  .bed.tucked .zzz span:nth-child(2) { animation-delay: 0.9s; }
  .bed.tucked .zzz span:nth-child(3) { animation-delay: 1.8s; }
  @keyframes zzz-drift {
    0%   { opacity: 0; transform: translate(0, 4px) rotate(-10deg) scale(0.5); }
    30%  { opacity: 1; }
    100% { opacity: 0; transform: translate(9px, -20px) rotate(16deg) scale(1.2); }
  }

  /* ----- Wake-up happy animations (each bed gets one) ----- */
  .bed.waking .animal { transform-origin: center center; }

  .bed.waking[data-wake="jump"]    .animal { animation: wake-jump    1.0s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .bed.waking[data-wake="wiggle"]  .animal { animation: wake-wiggle  1.0s ease-in-out; }
  .bed.waking[data-wake="spin"]    .animal { animation: wake-spin    1.0s cubic-bezier(0.34, 1.2, 0.64, 1); }
  .bed.waking[data-wake="pop"]     .animal { animation: wake-pop     0.9s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .bed.waking[data-wake="shimmy"]  .animal { animation: wake-shimmy  0.9s ease-in-out; }
  .bed.waking[data-wake="tada"]    .animal { animation: wake-tada    1.1s ease-in-out; }
  .bed.waking[data-wake="bounce"]  .animal { animation: wake-bounce  1.0s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .bed.waking[data-wake="stretch"] .animal { animation: wake-stretch 1.0s cubic-bezier(0.34, 1.4, 0.64, 1); }

  @keyframes wake-jump {
    0%   { transform: translateX(-50%) translateY(0) rotate(0); }
    25%  { transform: translateX(-50%) translateY(-14px) rotate(-14deg); }
    50%  { transform: translateX(-50%) translateY(-14px) rotate(14deg); }
    75%  { transform: translateX(-50%) translateY(-4px) rotate(-5deg); }
    100% { transform: translateX(-50%) translateY(0) rotate(0); }
  }
  @keyframes wake-wiggle {
    0%, 100% { transform: translateX(-50%) rotate(0); }
    15% { transform: translateX(-50%) rotate(-20deg); }
    30% { transform: translateX(-50%) rotate(20deg); }
    45% { transform: translateX(-50%) rotate(-16deg); }
    60% { transform: translateX(-50%) rotate(14deg); }
    75% { transform: translateX(-50%) rotate(-8deg); }
    90% { transform: translateX(-50%) rotate(4deg); }
  }
  @keyframes wake-spin {
    0%   { transform: translateX(-50%) rotate(0) scale(1); }
    50%  { transform: translateX(-50%) rotate(180deg) scale(1.18); }
    100% { transform: translateX(-50%) rotate(360deg) scale(1); }
  }
  @keyframes wake-pop {
    0%   { transform: translateX(-50%) scale(1); }
    25%  { transform: translateX(-50%) scale(1.4) translateY(-4px); }
    55%  { transform: translateX(-50%) scale(0.82); }
    75%  { transform: translateX(-50%) scale(1.15); }
    100% { transform: translateX(-50%) scale(1); }
  }
  @keyframes wake-shimmy {
    0%, 100% { transform: translateX(-50%); }
    14% { transform: translateX(-68%) rotate(-4deg); }
    28% { transform: translateX(-32%) rotate(4deg); }
    42% { transform: translateX(-63%) rotate(-3deg); }
    56% { transform: translateX(-37%) rotate(3deg); }
    70% { transform: translateX(-58%) rotate(-2deg); }
    84% { transform: translateX(-42%); }
  }
  @keyframes wake-tada {
    0%   { transform: translateX(-50%) scale(1) rotate(0); }
    10%  { transform: translateX(-50%) scale(0.9) rotate(-8deg); }
    20%  { transform: translateX(-50%) scale(1.18) rotate(8deg); }
    40%  { transform: translateX(-50%) scale(1.18) rotate(-8deg); }
    60%  { transform: translateX(-50%) scale(1.18) rotate(8deg); }
    80%  { transform: translateX(-50%) scale(1.08) rotate(-4deg); }
    100% { transform: translateX(-50%) scale(1) rotate(0); }
  }
  @keyframes wake-bounce {
    0%   { transform: translateX(-50%) translateY(0) scaleY(1); }
    18%  { transform: translateX(-50%) translateY(2px) scaleY(0.75); }
    40%  { transform: translateX(-50%) translateY(-14px) scaleY(1.12); }
    60%  { transform: translateX(-50%) translateY(0) scaleY(0.9); }
    80%  { transform: translateX(-50%) translateY(-6px) scaleY(1.05); }
    100% { transform: translateX(-50%) translateY(0) scaleY(1); }
  }
  @keyframes wake-stretch {
    0%   { transform: translateX(-50%) scale(1, 1); }
    30%  { transform: translateX(-50%) scale(0.88, 1.24) translateY(-10px); }
    55%  { transform: translateX(-50%) scale(1.14, 0.92) translateY(0); }
    80%  { transform: translateX(-50%) scale(0.96, 1.06); }
    100% { transform: translateX(-50%) scale(1, 1); }
  }

  /* Tap sparkle */
  .sparkle {
    position: absolute;
    pointer-events: none;
    z-index: 10;
    color: var(--moonlight);
    font-family: 'Fraunces', serif;
    font-size: 10px;
    opacity: 0;
    animation: sparkle-pop 0.8s ease-out forwards;
  }
  @keyframes sparkle-pop {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0) rotate(0); }
    30%  { opacity: 1; transform: translate(-50%, -50%) scale(1.2) rotate(20deg); }
    100% { opacity: 0; transform: translate(-50%, -110%) scale(0.5) rotate(55deg); }
  }

  /* ----- Finale ----- */
  .finale {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(50, 40, 110, 0.28) 0%, rgba(20, 16, 50, 0.88) 75%);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.9s ease;
    z-index: 40;
    padding: 40px;
    text-align: center;
  }
  .finale.show { opacity: 1; pointer-events: all; }

  .finale-moon {
    position: relative;
    width: 92px;
    height: 92px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffaee 0%, #f3d896 65%, #d6b77a 100%);
    box-shadow:
      0 0 50px rgba(255, 245, 220, 0.55),
      0 0 120px rgba(255, 245, 220, 0.3),
      inset -12px -6px 0 -2px rgba(0, 0, 0, 0.1);
    animation: moon-pulse 3.5s ease-in-out infinite;
    margin-bottom: 4px;
  }
  .finale-moon::before, .finale-moon::after {
    content: '✦';
    position: absolute;
    font-family: 'Fraunces', serif;
    color: var(--moonlight);
    font-size: 14px;
    opacity: 0.85;
    animation: finale-sparkle 2.5s ease-in-out infinite;
  }
  .finale-moon::before { top: -14px; left: -18px; animation-delay: 0.5s; font-size: 18px; }
  .finale-moon::after  { bottom: -8px; right: -20px; animation-delay: 1.2s; }

  @keyframes moon-pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.06); }
  }
  @keyframes finale-sparkle {
    0%, 100% { opacity: 0.3; transform: scale(0.9); }
    50%      { opacity: 1;   transform: scale(1.15) rotate(15deg); }
  }

  .finale h2 {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 54px;
    letter-spacing: -0.025em;
    line-height: 1;
    margin-top: 14px;
  }
  .finale h2 .dot { color: #f4c19a; }
  .finale p {
    font-size: 13.5px;
    opacity: 0.72;
    max-width: 230px;
    line-height: 1.55;
    margin-top: 2px;
    font-weight: 500;
  }

  .finale-actions {
    margin-top: 24px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .finale button {
    background: transparent;
    border: 1.5px solid rgba(255, 245, 220, 0.35);
    color: var(--moonlight);
    padding: 11px 26px;
    border-radius: 999px;
    font-family: 'Quicksand', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.02em;
    min-width: 170px;
  }
  .finale button:not(:disabled):hover {
    background: rgba(255, 245, 220, 0.08);
    border-color: rgba(255, 245, 220, 0.7);
    transform: translateY(-1px);
  }
  .finale button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-style: dashed;
  }
  .finale .wake-hint {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11.5px;
    color: var(--moonlight);
    opacity: 0;
    transition: opacity 0.3s;
    letter-spacing: 0.02em;
  }
  .finale .wake-hint.visible { opacity: 0.55; }

  @media (max-height: 900px) {
    .phone { max-height: 92vh; }
  }
</style>
</head>
<body>

<main class="phone" aria-label="Bed time bedtime prototype">
  <div class="island" aria-hidden="true"></div>
  <div class="stars" id="stars" aria-hidden="true"></div>
  <div class="moon" aria-hidden="true"></div>

  <div class="status-bar" aria-hidden="true">
    <span>9:41</span>
    <div class="indicators">
      <span class="bars"><i></i><i></i><i></i><i></i></span>
      <span class="battery"><span></span></span>
    </div>
  </div>

  <header class="header">
    <h1>Bed time<span class="dot">.</span></h1>
    <p class="subtitle">Tap each friend to tuck them in.</p>
  </header>

  <section class="beds" id="beds"></section>

  <div class="finale" id="finale" role="dialog" aria-hidden="true">
    <div class="finale-moon"></div>
    <h2>Sweet dreams<span class="dot">.</span></h2>
    <p>All forty-two friends are snoozing peacefully under the quiet moon.</p>
    <div class="finale-actions">
      <button id="wakeBtn" disabled>Resting · 20s</button>
      <span class="wake-hint" id="wakeHint">Please don't wake them just yet.</span>
    </div>
  </div>
</main>

<script>
  /* -------- Stars -------- */
  (function makeStars() {
    const box = document.getElementById('stars');
    for (let i = 0; i < 34; i++) {
      const s = document.createElement('span');
      s.className = 'star';
      const size = 1 + Math.random() * 2.2;
      s.style.width = s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 55 + '%';
      s.style.animationDelay = (Math.random() * 3).toFixed(2) + 's';
      s.style.animationDuration = (2 + Math.random() * 2.5).toFixed(2) + 's';
      box.appendChild(s);
    }
  })();

  /* -------- Animal SVGs (60x60 viewBox) -------- */
  const animals = [
    {
      name: 'Bunny',
      blanket: '#f3a5b8', blanketDark: '#c46d84',
      svg: `<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="22" cy="12" rx="5" ry="14" fill="#fff2e3" stroke="#d4b8a0" stroke-width="1"/>
        <ellipse cx="22" cy="14" rx="2.4" ry="9" fill="#f4b3c4"/>

  /* -------- Build grid: 6 × 7 = 42 beds -------- */
  const ROWS = 7, COLS = 6, TOTAL = ROWS * COLS;
  const bedsContainer = document.getElementById('beds');
  const beds = [];

  // distribute animals evenly (7 of each), then shuffle lightly
  const pool = [];
  for (let i = 0; i < TOTAL; i++) pool.push(animals[i % animals.length]);
  // Fisher–Yates shuffle
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }

  const wakes = ['jump', 'wiggle', 'spin', 'pop', 'shimmy', 'tada', 'bounce', 'stretch'];
  function pickZCount() {
    // weighted: 20% have none, 30% have 1, 30% have 2, 20% have 3
    const r = Math.random();
    if (r < 0.20) return 0;
    if (r < 0.50) return 1;
    if (r < 0.80) return 2;
    return 3;
  }

  pool.forEach((animal, i) => {
    const bed = document.createElement('button');
    bed.className = 'bed';
    bed.setAttribute('aria-pressed', 'false');
    bed.setAttribute('aria-label', `Tuck ${animal.name} in`);
    bed.style.setProperty('--blanket', animal.blanket);
    bed.style.setProperty('--blanket-dark', animal.blanketDark);
    bed.dataset.wake = wakes[Math.floor(Math.random() * wakes.length)];
    const zCount = pickZCount();
    const zs = Array.from({ length: zCount }, () => '<span>z</span>').join('');
    bed.innerHTML = `
      <div class="pillow"></div>
      <div class="animal" style="animation-delay: ${(Math.random() * 2).toFixed(2)}s">${animal.svg}</div>
      <div class="blanket"></div>
      <div class="zzz">${zs}</div>
    `;
    bedsContainer.appendChild(bed);
    beds.push(bed);
  });

  /* -------- Interaction -------- */
  const finale = document.getElementById('finale');
  const wakeBtn = document.getElementById('wakeBtn');
  const wakeHint = document.getElementById('wakeHint');
  const phone = document.querySelector('.phone');

  let countdownInterval = null;

  function sparkleBurst(bed) {
    const rect = bed.getBoundingClientRect();
    const pr = phone.getBoundingClientRect();
    const symbols = ['✦', '✧', '·'];
    for (let i = 0; i < 3; i++) {
      const s = document.createElement('span');
      s.className = 'sparkle';
      s.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      s.style.left = (rect.left - pr.left + 6 + Math.random() * (rect.width - 12)) + 'px';
      s.style.top = (rect.top - pr.top + 6 + Math.random() * 18) + 'px';
      s.style.animationDelay = (Math.random() * 0.2).toFixed(2) + 's';
      s.style.fontSize = (7 + Math.random() * 5).toFixed(0) + 'px';
      phone.appendChild(s);
      setTimeout(() => s.remove(), 1200);
    }
  }

  function allTucked() {
    return beds.every(b => b.classList.contains('tucked'));
  }

  function showFinale() {
    finale.classList.add('show');
    finale.setAttribute('aria-hidden', 'false');
    startCountdown();
  }

  function hideFinale() {
    finale.classList.remove('show');
    finale.setAttribute('aria-hidden', 'true');
    if (countdownInterval) {
      clearInterval(countdownInterval);
      countdownInterval = null;
    }
    wakeHint.classList.remove('visible');
  }

  function startCountdown() {
    let remaining = 20;
    wakeBtn.disabled = true;
    wakeBtn.textContent = `Resting · ${remaining}s`;
    wakeHint.classList.add('visible');
    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(countdownInterval);
        countdownInterval = null;
        wakeBtn.disabled = false;
        wakeBtn.textContent = 'Wake them up';
        wakeHint.classList.remove('visible');
      } else {
        wakeBtn.textContent = `Resting · ${remaining}s`;
      }
    }, 1000);
  }

  beds.forEach(bed => {
    bed.addEventListener('click', () => {
      if (bed.classList.contains('tucked')) return;
      bed.classList.add('tucked');
      bed.setAttribute('aria-pressed', 'true');
      sparkleBurst(bed);
      if (allTucked()) {
        setTimeout(showFinale, 700);
      }
    });
    bed.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        bed.click();
      }
    });
  });

  wakeBtn.addEventListener('click', () => {
    if (wakeBtn.disabled) return;
    hideFinale();
    beds.forEach((bed, i) => {
      setTimeout(() => {
        bed.classList.add('waking');
        bed.classList.remove('tucked');
        bed.setAttribute('aria-pressed', 'false');
        setTimeout(() => bed.classList.remove('waking'), 1200);
      }, i * 14);
    });
  });
